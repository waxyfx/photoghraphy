<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  <title>Admin Panel | Aibolat Photography</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");

    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-input: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --text: #ffffff;
      --text-sec: #888888;
      --accent: #ffffff;
      --danger: #ff4444;
      --danger-hover: #ff6666;
      --success: #44ff88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background-color: rgba(10,10,10,0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .admin-header a {
      color: var(--text-sec);
      font-size: 0.8rem;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .admin-header a:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .admin-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .admin-tab {
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-sec);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 2px solid transparent;
      font-family: "Inter", sans-serif;
    }

    .admin-tab:hover { color: var(--text); }
    .admin-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .section-header-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .photo-count {
      font-size: 0.85rem;
      color: var(--text-sec);
    }

    /* Photo Grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .photo-card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 0.75rem;
      transition: all 0.3s;
    }

    .photo-card:hover { border-color: var(--border-hover); }

    .photo-card.selected {
      border-color: var(--danger);
      background: rgba(255,68,68,0.05);
    }

    .photo-card__preview {
      position: relative;
      margin-bottom: 0.75rem;
      cursor: pointer;
    }

    .photo-card__preview img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      filter: grayscale(80%);
      display: block;
      background: var(--bg-input);
    }

    .photo-card__checkbox {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .select-mode .photo-card__checkbox {
      display: flex;
    }

    .photo-card__checkbox i {
      font-size: 1rem;
      color: var(--text);
      opacity: 0;
    }

    .photo-card.selected .photo-card__checkbox {
      background: var(--danger);
      border-color: var(--danger);
    }

    .photo-card.selected .photo-card__checkbox i {
      opacity: 1;
    }

    .photo-card__delete {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      color: var(--danger);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
    }

    .photo-card:hover .photo-card__delete {
      opacity: 1;
    }

    .select-mode .photo-card__delete {
      display: none;
    }

    .photo-card__delete:hover {
      background: var(--danger);
      color: var(--text);
      border-color: var(--danger);
    }

    .photo-card label {
      display: block;
      font-size: 0.65rem;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .photo-card input[type="text"] {
      width: 100%;
      padding: 0.4rem 0.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.8rem;
      font-family: "Inter", sans-serif;
      transition: border-color 0.3s;
    }

    .photo-card input[type="text"]:focus {
      outline: none;
      border-color: var(--border-hover);
    }

    /* Add photo card */
    .add-photo-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      background: var(--bg-card);
      border: 2px dashed var(--border);
      cursor: pointer;
      transition: all 0.3s;
    }

    .add-photo-card:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.02);
    }

    .add-photo-card.dragover {
      border-color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .add-photo-card i {
      font-size: 2rem;
      color: var(--text-sec);
      margin-bottom: 0.5rem;
    }

    .add-photo-card span {
      font-size: 0.8rem;
      color: var(--text-sec);
    }

    .add-photo-card input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    /* Pricing Editor */
    .pricing-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .pricing-section h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .field label {
      font-size: 0.7rem;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .field input, .field textarea {
      width: 100%;
      padding: 0.6rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      font-family: "Inter", sans-serif;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: var(--border-hover);
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .features-list .field { width: 100%; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: "Inter", sans-serif;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255,68,68,0.3);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: var(--text);
      border-color: var(--danger);
    }

    .btn-select {
      background: transparent;
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .btn-select.active {
      color: var(--danger);
      border-color: rgba(255,68,68,0.5);
      background: rgba(255,68,68,0.1);
    }

    .actions-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .actions-bottom {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .select-info {
      font-size: 0.8rem;
      color: var(--text-sec);
      display: none;
    }

    .select-mode .select-info {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      background: var(--text);
      color: var(--bg);
      font-size: 0.85rem;
      font-weight: 500;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Language Selector */
    .language-selector {
      display: flex;
      align-items: center;
    }

    .lang-buttons {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
    }

    .lang-btn {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text-sec);
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.3s;
      font-family: "Inter", sans-serif;
    }

    .lang-btn:last-child {
      border-right: none;
    }

    .lang-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .lang-btn.active {
      color: var(--bg);
      background: var(--text);
    }

    @media (max-width: 640px) {
      .field-group { grid-template-columns: 1fr; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .admin-container { padding: 1rem; }
      .section-header { flex-direction: column; align-items: flex-start; }
      .language-selector { margin-top: 1rem; }
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <h1>ADMIN PANEL</h1>
    <a href="index.html"><i class="ri-arrow-left-line"></i> Back to Site</a>
  </div>

  <div class="admin-container">
    <div class="admin-tabs" id="admin-tabs">
      <button type="button" class="admin-tab active" data-tab="photos">

      </button>
      <button type="button" class="admin-tab" data-tab="pricing">

      </button>
    </div>

    <!-- Photos Tab -->

      <div class="section-header">

          <h2 class="section-title">Portfolio Photos</h2>
          <p class="photo-count" id="photo-count">0 photos</p>
        </div>
        <div class="actions-bar">
          <button type="button" class="btn btn-select" id="select-mode-btn">
            <i class="ri-checkbox-multiple-line"></i> Select Multiple

          <button type="button" class="btn btn-danger" id="delete-selected-btn" style="display:none;">

          </p>
        </div>
        <div class="language-selector">
          <label style="font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 0.75rem;">Site Language</label>
          <div class="lang-buttons" id="lang-buttons">
            <button type="button" class="lang-btn active" data-lang="en">EN</button>
            <button type="button" class="lang-btn" data-lang="ru">RU</button>
            <button type="button" class="lang-btn" data-lang="kz">KZ</button>

        </div>
      </div>

          <div class="field"><label>Feature 2</label><input type="text" data-pricing-key="pricing.standart.f2" value="6 hours of shooting" /></div>
          <div class="field"><label>Feature 3</label><input type="text" data-pricing-key="pricing.standart.f3" value="300-500 photos in artistic processing" /></div>
          <div class="field"><label>Feature 4</label><input type="text" data-pricing-key="pricing.standart.f4" value="Personal online gallery" /></div>
          <div class="field"><label>Feature 5</label><input type="text" data-pricing-key="pricing.standart.f5" value="Photos ready within a month" /></div>
          <div class="field"><label>Feature 6</label><input type="text" data-pricing-key="pricing.standart.f6" value="Backup storage for 12 months" /></div>

      <!-- Elite -->

        <h3>Elite Package</h3>

          <div class="field">
            <label>Package Name</label>
            <input type="text" data-pricing-key="pricing.elite.name" value="Elite" />
          </div>
          <div class="field">
            <label>Tagline</label>
            <input type="text" data-pricing-key="pricing.elite.tagline" value="The ideal solution for a full wedding day" />

        </div>

        </div>

      <!-- Premium -->

          <div class="field"><label>Feature 7</label><input type="text" data-pricing-key="pricing.premium.f7" value="Backup storage for 12 months" /></div>

      <!-- Individual -->

        <h3>Individual Photosession</h3>

            <label>Name</label>
            <input type="text" data-pricing-key="pricing.individual.name" value="Individual Photosession" />

        <div class="features-list">
          <div class="field"><label>Feature 1</label><input type="text" data-pricing-key="pricing.individual.f1" value="1 hour of shooting" /></div>
          <div class="field"><label>Feature 2</label><input type="text" data-pricing-key="pricing.individual.f2" value="50-100 photos in artistic processing" /></div>

      <!-- Additional Services -->

        <h3>Additional Services</h3>

    const defaultPhotos = [

      { url: "https://images.unsplash.com/photo-1606216794074-735e91aa2c92?w=600&h=800&fit=crop&q=80", alt: "Wedding photography", category: "Wedding" },
      { url: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=600&h=800&fit=crop&q=80", alt: "Portrait photography", category: "Portrait" },
      { url: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=600&h=800&fit=crop&q=80", alt: "Event photography", category: "Event" },
      { url: "https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=600&h=800&fit=crop&q=80", alt: "Wedding photography", category: "Wedding" },
    ];

    let selectMode = false;
    let selectedPhotos = new Set();

    // ========== TAB SWITCHING ==========
    const tabs = document.querySelectorAll(".admin-tab");
    const tabContents = document.querySelectorAll(".tab-content");

    tabs.forEach(tab => {
      tab.addEventListener("click", function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const tabName = this.dataset.tab;
        
        tabs.forEach(t => t.classList.remove("active"));
        tabContents.forEach(c => c.classList.remove("active"));
        
        this.classList.add("active");
        document.getElementById("tab-" + tabName).classList.add("active");
      });
    });

    // ========== TOAST ==========
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ========== PHOTOS ==========
    function loadPhotos() {
      const saved = localStorage.getItem("admin_portfolio_photos");
      return saved ? JSON.parse(saved) : [...defaultPhotos];
    }

    function updatePhotoCount() {
      const photos = loadPhotos();
      document.getElementById("photo-count").textContent = `${photos.length} photo${photos.length !== 1 ? 's' : ''}`;
    }

    function updateSelectedCount() {
      const countEl = document.getElementById("selected-count");
      const deleteBtn = document.getElementById("delete-selected-btn");
      countEl.textContent = selectedPhotos.size;
      deleteBtn.style.display = selectedPhotos.size > 0 ? "inline-flex" : "none";
    }

    function renderPhotoGrid() {
      const grid = document.getElementById("photo-grid");
      const photos = loadPhotos();
      grid.innerHTML = "";

      // Render existing photos
      photos.forEach((photo, i) => {
        const card = document.createElement("div");
        card.className = "photo-card";
        card.dataset.index = i;
        if (selectedPhotos.has(i)) {
          card.classList.add("selected");
        }

        card.innerHTML = `
          <div class="photo-card__preview">
            <img src="${photo.url}" alt="${photo.alt}" onerror="this.src='https://via.placeholder.com/400x533/1a1a1a/555?text=No+Image'" />
            <div class="photo-card__checkbox">
              <i class="ri-check-line"></i>
            </div>
            <button type="button" class="photo-card__delete" data-index="${i}" title="Delete photo">
              <i class="ri-delete-bin-line"></i>
            </button>
          </div>
          <label>Category</label>
          <input type="text" class="photo-cat" value="${photo.category}" placeholder="Wedding / Portrait / Event" />
        `;

        grid.appendChild(card);
      });

      // Add "Add Photo" card
      const addCard = document.createElement("div");
      addCard.className = "add-photo-card";
      addCard.id = "add-photo-card";
      addCard.innerHTML = `
        <i class="ri-add-line"></i>
        <span>Add New Photo</span>
      `;
      grid.appendChild(addCard);

      updatePhotoCount();
      updateSelectedCount();
    }

    // ========== FILE INPUT (Hidden, created dynamically) ==========
    function openFilePicker(callback, multiple = false) {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.multiple = multiple;
      input.style.display = "none";
      document.body.appendChild(input);
      
      input.addEventListener("change", function() {
        if (this.files && this.files.length > 0) {
          callback(this.files);
        }
        document.body.removeChild(input);
      });
      
      input.click();
    }

    function addPhotosFromFiles(files) {
      const photos = loadPhotos();
      let loaded = 0;
      const total = files.length;

      Array.from(files).forEach(file => {
        if (file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = function(e) {
            photos.push({
              url: e.target.result,
              alt: file.name.replace(/\.[^/.]+$/, ""),
              category: "Photo"
            });
            loaded++;
            if (loaded === total) {
              localStorage.setItem("admin_portfolio_photos", JSON.stringify(photos));
              renderPhotoGrid();
              showToast(`${total} photo${total > 1 ? 's' : ''} added!`);
            }
          };
          reader.readAsDataURL(file);
        }
      });
    }

    function deletePhoto(index) {
      if (confirm("Are you sure you want to delete this photo?")) {
        const photos = loadPhotos();
        photos.splice(index, 1);
        localStorage.setItem("admin_portfolio_photos", JSON.stringify(photos));
        selectedPhotos.clear();
        renderPhotoGrid();
        showToast("Photo deleted!");
      }
    }

    function deleteSelectedPhotos() {
      if (selectedPhotos.size === 0) return;
      
      if (confirm(`Delete ${selectedPhotos.size} selected photo${selectedPhotos.size > 1 ? 's' : ''}?`)) {
        const photos = loadPhotos();
        const indices = Array.from(selectedPhotos).sort((a, b) => b - a);
        indices.forEach(i => photos.splice(i, 1));
        localStorage.setItem("admin_portfolio_photos", JSON.stringify(photos));
        selectedPhotos.clear();
        exitSelectMode();
        renderPhotoGrid();
        showToast("Photos deleted!");
      }
    }

    function savePhotos() {
      const cards = document.querySelectorAll(".photo-card");
      const photos = loadPhotos();
      
      cards.forEach((card, i) => {
        if (photos[i]) {
          photos[i].category = card.querySelector(".photo-cat").value;
        }
      });

      localStorage.setItem("admin_portfolio_photos", JSON.stringify(photos));
      showToast("Photos saved!");
    }

    function resetPhotos() {
      if (confirm("Reset all photos to default?")) {
        localStorage.removeItem("admin_portfolio_photos");
        selectedPhotos.clear();
        exitSelectMode();
        renderPhotoGrid();
        showToast("Photos reset!");
      }
    }

    // ========== SELECT MODE ==========
    function toggleSelectMode() {
      selectMode = !selectMode;
      const btn = document.getElementById("select-mode-btn");
      const grid = document.getElementById("photo-grid");
      const info = document.getElementById("select-info");

      if (selectMode) {
        btn.classList.add("active");
        btn.innerHTML = '<i class="ri-close-line"></i> Cancel';
        grid.classList.add("select-mode");
        info.style.display = "block";
      } else {
        exitSelectMode();
      }
    }

    function exitSelectMode() {
      selectMode = false;
      selectedPhotos.clear();
      const btn = document.getElementById("select-mode-btn");
      const grid = document.getElementById("photo-grid");
      const info = document.getElementById("select-info");

      btn.classList.remove("active");
      btn.innerHTML = '<i class="ri-checkbox-multiple-line"></i> Select Multiple';
      grid.classList.remove("select-mode");
      info.style.display = "none";

      document.querySelectorAll(".photo-card").forEach(card => {
        card.classList.remove("selected");
      });
      updateSelectedCount();
    }

    function togglePhotoSelection(index, card) {
      if (selectedPhotos.has(index)) {
        selectedPhotos.delete(index);
        card.classList.remove("selected");
      } else {
        selectedPhotos.add(index);
        card.classList.add("selected");
      }
      updateSelectedCount();
    }

    // ========== PRICING ==========
    function loadPricing() {
      const saved = localStorage.getItem("admin_pricing_data");
      return saved ? JSON.parse(saved) : {};
    }

    function initPricingFields() {
      const saved = loadPricing();
      document.querySelectorAll("[data-pricing-key]").forEach(input => {
        const key = input.dataset.pricingKey;
        if (saved[key]) {
          input.value = saved[key];
        }
      });
    }

    function savePricing() {
      const data = {};
      document.querySelectorAll("[data-pricing-key]").forEach(input => {
        data[input.dataset.pricingKey] = input.value;
      });
      localStorage.setItem("admin_pricing_data", JSON.stringify(data));
      showToast("Pricing saved!");
    }

    function resetPricing() {
      if (confirm("Reset pricing to defaults?")) {
        localStorage.removeItem("admin_pricing_data");
        location.reload();
      }
    }

    // ========== EVENT LISTENERS ==========
    
    // Photo grid click handler (delegation)
    document.getElementById("photo-grid").addEventListener("click", function(e) {
      e.stopPropagation();

      // Add photo card clicked
      if (e.target.closest("#add-photo-card")) {
        openFilePicker(addPhotosFromFiles, true);
        return;
      }

      // Delete button clicked
      const deleteBtn = e.target.closest(".photo-card__delete");
      if (deleteBtn && !selectMode) {
        e.preventDefault();
        const index = parseInt(deleteBtn.dataset.index);
        deletePhoto(index);
        return;
      }

      // Photo card clicked (for selection)
      const card = e.target.closest(".photo-card");
      if (card && selectMode) {
        const index = parseInt(card.dataset.index);
        togglePhotoSelection(index, card);
        return;
      }
    });

    // Drag and drop on add card
    document.getElementById("photo-grid").addEventListener("dragover", function(e) {
      const addCard = document.getElementById("add-photo-card");
      if (addCard && addCard.contains(e.target)) {
        e.preventDefault();
        addCard.classList.add("dragover");
      }
    });

    document.getElementById("photo-grid").addEventListener("dragleave", function(e) {
      const addCard = document.getElementById("add-photo-card");
      if (addCard) {
        addCard.classList.remove("dragover");
      }
    });

    document.getElementById("photo-grid").addEventListener("drop", function(e) {
      const addCard = document.getElementById("add-photo-card");
      if (addCard && addCard.contains(e.target)) {
        e.preventDefault();
        addCard.classList.remove("dragover");
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          addPhotosFromFiles(files);
        }
      }
    });

    // Button listeners
    document.getElementById("select-mode-btn").addEventListener("click", toggleSelectMode);
    document.getElementById("delete-selected-btn").addEventListener("click", deleteSelectedPhotos);
    document.getElementById("save-photos-btn").addEventListener("click", savePhotos);
    document.getElementById("reset-photos-btn").addEventListener("click", resetPhotos);
    document.getElementById("save-pricing-btn").addEventListener("click", savePricing);
    document.getElementById("reset-pricing-btn").addEventListener("click", resetPricing);

    // ========== LANGUAGE SELECTOR ==========
    function initLanguageSelector() {
      const savedLang = localStorage.getItem("preferred_language") || "en";
      const langBtns = document.querySelectorAll(".lang-btn");
      
      // Set active state based on saved language
      langBtns.forEach(btn => {
        if (btn.dataset.lang === savedLang) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }
      });
      
      // Add click handlers
      langBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          const lang = this.dataset.lang;
          
          // Update UI
          langBtns.forEach(b => b.classList.remove("active"));
          this.classList.add("active");
          
          // Save to localStorage
          localStorage.setItem("preferred_language", lang);
          
          showToast(`Language changed to ${lang.toUpperCase()}. Site will update on refresh.`);
        });
      });
    }

    // ========== INIT ==========
    renderPhotoGrid();
    initPricingFields();
    initLanguageSelector();
  </script>
</body>
</html>
